<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amoula's Dishes</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcf8f2;
            color: #333;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #e07a5f;
            color: white;
            text-align: center;
            padding: 2rem;
        }
        h1 { margin: 0; font-size: 2.5rem; }
        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .welcome-card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }
        .btn {
            background-color: #3d5a80;
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Amoula's Dishes 🍳</h1>
        <p>أهلاً بكم في عالم الوصفات الشهية</p>
    </header>

    <div class="container">
        <div class="welcome-card">
            <h2>الموقع قيد الإنشاء 🚀</h2>
            <p>هنا هتظهر أحلى وأجمل الأكلات والوصفات قريباً جداً. خليكم مستنيين!</p>
            <a href="#" class="btn">تصفح الوصفات قريباً</a>
        </div>
    </div>

</body>
</html>
